name: Run Jest Tests

on:
  pull_request:
    paths:
      - "write-to-influxdb/**"
      - "publish-release-notes/**"
      - "get-release-notes/**"
      # Add more folders as needed
  push:
    branches:
      - main
    paths:
      - "write-to-influxdb/**"
      - "publish-release-notes/**"
      - "get-release-notes/**"
      # Add more folders as needed

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        folder:
          - "write-to-influxdb"
          - "publish-release-notes"
          - "get-release-notes"
          # Add more folders as needed

    steps:
      - name: Checkout code
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v7.0.0
        with:
          submodules: "true"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin@v6.4.0
        with:
          node-version-file: .node-version
          cache-dependency-path: ${{ matrix.folder }}/package-lock.json
          cache: npm

      - name: Install Dependencies
        run: npm ci
        working-directory: ${{ matrix.folder }}

      - run: npm run test
        working-directory: ${{ matrix.folder }}
