name: Lint Codebase

on:
  pull_request:
    paths:
      - "write-to-influxdb/**"
      - "github-app-token/**"
      - "publish-release-notes/**"
      - "get-release-notes/**"
      - "validate-pull-request-title/**"
      # Add more folders as needed
  push:
    branches:
      - main
    paths:
      - "write-to-influxdb/**"
      - "github-app-token/**"
      - "publish-release-notes/**"
      - "get-release-notes/**"
      - "validate-pull-request-title/**"
      # Add more folders as needed

permissions:
  contents: read

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest

    strategy:
      matrix:
        folder:
          - "write-to-influxdb"
          - "github-app-token"
          - "publish-release-notes"
          - "get-release-notes"
          - "validate-pull-request-title"
          # Add more folders as needed

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin@v6.4.0
        with:
          node-version-file: .node-version
          cache-dependency-path: ${{ matrix.folder }}/package-lock.json
          cache: npm

      - name: Install Dependencies
        run: npm ci
        working-directory: ${{ matrix.folder }}

      - name: Lint
        run: npm run lint
        working-directory: ${{ matrix.folder }}

      - name: Check Formatting
        run: npm run format:check
        working-directory: ${{ matrix.folder }}
