name: E2E Test Environment Dispatch

on:
  pull_request:
    paths:
      - 'publish-release-notes/**'
      - '.github/workflows/test-environment-e2e*.yml'

jobs:
  send-test-event:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # pin@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # pin@v4
        with:
          node-version-file: 'publish-release-notes/.node-version'

      - name: Install and test
        run: cd publish-release-notes && npm ci && npm run ci-test && npm run package

      - name: Send repository_dispatch event
        uses: actions/github-script@v7
        with:
          script: |
            console.log('\n🚀 SENDING GITHUB REPOSITORY_DISPATCH EVENT\n');
            
            const testPayload = {
              'application-name': 'e2e-test-app',
              'product': 'e2e-test-product',
              'release-notes': JSON.stringify(['E2E Test: environment verification']),
              'sha': context.sha,
              'title': 'E2E Test Release',
              'date': new Date().toISOString(),
              'environment': 'prod'
            };
            
            console.log('📤 Event details:');
            console.log('   Type: repository_dispatch');
            console.log('   Event: test-environment-verification');
            console.log('\n📋 Payload being sent:');
            Object.entries(testPayload).forEach(([key, value]) => {
              const display = typeof value === 'string' && value.length > 50 
                ? value.substring(0, 50) + '...' 
                : value;
              console.log(`   ${key}: ${display}`);
            });
            
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'test-environment-verification',
              client_payload: testPayload
            });
            
            console.log('\n✅ Event dispatched to GitHub');
            console.log('\n⏳ Listener workflow will now receive and verify this event...');

