name: E2E Test Environment Dispatch

on:
  pull_request:
    paths:
      - 'publish-release-notes/**'
      - '.github/workflows/test-environment-e2e.yml'

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # pin@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # pin@v4
        with:
          node-version-file: 'publish-release-notes/.node-version'

      - name: Install dependencies
        run: cd publish-release-notes && npm ci

      - name: Run tests
        run: cd publish-release-notes && npm run ci-test

      - name: Package action
        run: cd publish-release-notes && npm run package

      - name: Test environment=prod in dispatch payload
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read the built dist/index.js to verify environment is included
            const distPath = '${{ github.workspace }}/publish-release-notes/dist/index.js';
            const distContent = fs.readFileSync(distPath, 'utf8');
            
            // Check that environment is in the clientPayload
            if (!distContent.includes('environment')) {
              throw new Error('❌ FAILED: "environment" not found in built action');
            }
            
            console.log('✅ Environment field is included in built action');
            
            // Simulate what the action sends
            const mockPayload = {
              'application-name': 'test-app',
              'product': 'test-product',
              'release-notes': JSON.stringify(['Test: environment verification']),
              'sha': 'abc123',
              'title': 'Test Release',
              'date': new Date().toISOString(),
              'environment': 'prod'
            };
            
            console.log('\n📦 Simulated dispatch payload:');
            console.log(JSON.stringify(mockPayload, null, 2));
            
            // Verify environment is in payload
            if (!mockPayload.environment) {
              throw new Error('❌ FAILED: environment missing from payload');
            }
            
            if (mockPayload.environment !== 'prod') {
              throw new Error(`❌ FAILED: expected environment='prod', got '${mockPayload.environment}'`);
            }
            
            console.log('\n✅ SUCCESS: environment correctly included with value "prod"');
            
            // Test with kt environment
            mockPayload.environment = 'kt';
            if (mockPayload.environment !== 'kt') {
              throw new Error(`❌ FAILED: expected environment='kt', got '${mockPayload.environment}'`);
            }
            
            console.log('✅ SUCCESS: environment correctly set to "kt"');

      - name: Verify tests pass
        run: cd publish-release-notes && npm test -- --coverage=false

      - name: Summary
        if: success()
        run: |
          echo "## ✅ E2E Test Results"
          echo ""
          echo "✅ Action builds successfully with environment support"
          echo "✅ Environment field is included in dispatch payload"
          echo "✅ Both 'prod' and 'kt' values verified"
          echo "✅ All unit tests pass"
