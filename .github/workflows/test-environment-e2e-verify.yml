name: E2E Test - Verify Environment Event

on:
  repository_dispatch:
    types: [test-environment-verification]

jobs:
  verify-event:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # pin@v4.2.2

      - name: Display received payload
        uses: actions/github-script@v7
        with:
          script: |
            console.log('\n✅ RECEIVED GITHUB REPOSITORY_DISPATCH EVENT\n');
            
            const received = context.payload.client_payload || {};
            
            console.log('📥 Event details:');
            console.log('   Type: repository_dispatch');
            console.log('   Event: test-environment-verification');
            
            console.log('\n📋 Received payload:');
            Object.entries(received).forEach(([key, value]) => {
              const display = typeof value === 'string' && value.length > 50 
                ? value.substring(0, 50) + '...' 
                : value;
              console.log(`   ${key}: ${display}`);
            });

      - name: Verify environment value
        uses: actions/github-script@v7
        with:
          script: |
            const received = context.payload.client_payload || {};
            
            console.log('\n🔍 VERIFICATION RESULTS\n');
            
            if (!received.environment) {
              throw new Error('❌ FAILED: environment field not found in received payload');
            }
            
            console.log(`✅ environment field present: "${received.environment}"`);
            
            if (received.environment !== 'prod') {
              throw new Error(`❌ FAILED: expected "prod", got "${received.environment}"`);
            }
            
            console.log('✅ environment value is correct');
            
            // Verify other required fields came through
            const required = ['application-name', 'product', 'release-notes', 'sha', 'title'];
            for (const field of required) {
              if (!received[field]) {
                throw new Error(`❌ FAILED: required field "${field}" missing from payload`);
              }
              console.log(`✅ ${field}: present`);
            }
            
            console.log('\n✅ All verifications passed!');
            console.log('\n💡 Summary: environment correctly sent via repository_dispatch and received intact');
