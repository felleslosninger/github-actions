name: E2E Test - Verify Environment Event

on:
  repository_dispatch:
    types: [test-environment-verification]

jobs:
  verify-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # pin@v4.2.2

      - name: Debug full payload
        run: |
          echo "Full event payload:"
          echo '${{ toJson(github.event) }}' | head -100

      - name: Verify environment in payload
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload.client_payload || {};
            
            console.log('📥 Received client_payload:');
            console.log(JSON.stringify(payload, null, 2));
            
            // Verify environment is present
            if (payload.environment === undefined) {
              throw new Error('❌ FAILED: environment not found in payload');
            }
            
            console.log(`✅ SUCCESS: environment = '${payload.environment}'`);
            
            // Verify other required fields
            const required = ['application-name', 'product', 'version', 'release-notes', 'sha'];
            for (const field of required) {
              if (payload[field] === undefined) {
                throw new Error(`❌ FAILED: required field '${field}' missing`);
              }
              console.log(`✅ ${field}: ${payload[field]}`);
            }
            
            console.log('\n✅ All verifications passed!');
