name: Publish Release Notes
description: |
  Automatically generates and publishes release notes based on provided inputs
  for applications and products. This action supports custom configurations to
  include or exclude specific products, applications, and commits.
author: Digdir Platform Team

inputs:
  application-name:
    description: "Name of application"
    required: true
  product:
    description: "Name of product"
    required: true
  version:
    description: "Application version"
    required: true
  release-notes:
    description: "Release notes array"
    required: true
  timestamp:
    description: "Timestamp for deployment"
    required: true
  github-token:
    description: "GitHub token"
    required: true
  repository-owner:
    description: "Owner of the repository"
    required: true
  repository-name:
    description: "Name of the repository"
    required: true
  event-type:
    description: "Type of event that triggers the action"
    required: true
  sha:
    description: "Sha of application commit"
    required: false
  allow-products:
    description: "List of products allowed to trigger release notes generation"
    required: false
    default: ""
  allow-applications:
    description: |
      "List of applications allowed to trigger release notes generation"
    required: false
    default: ""
  ignore-products:
    description: "Product(s) to ignore when publishing release notes"
    required: false
    default: ""
  ignore-applications:
    description: "Application(s) to ignore when publishing release notes"
    required: false
    default: ""
  ignore-commits:
    description: "Commits to ignore when generating release notes"
    required: false
  dependabot-replacement:
    description: |
      "Replacement text for dependabot-generated commit messages in release notes"
    required: false
  title:
    description: |
      "Title to use for public release notes entry (default is "product"
      variable)"
    required: false
  environment:
    description: |
      "Environment the release notes are for. Valid values: prod, kt.
      Default is prod (backward compatible)"
    required: false
    default: "prod"

outputs:
  release-notes-created:
    description: Indicates if release notes were created or not

runs:
  using: node24
  main: dist/index.js
